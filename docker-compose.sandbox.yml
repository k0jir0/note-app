services:
  proxy:
    image: nginx:1.27-alpine
    depends_on:
      - app
    user: "101:101"
    ports:
      - "${SANDBOX_PUBLIC_PORT:-3000}:8080"
    volumes:
      - ./ops/nginx/sandbox.conf:/etc/nginx/conf.d/default.conf:ro
    read_only: true
    tmpfs:
      - /tmp
      - /var/run:mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - edge_zone
      - app_zone

  app:
    build:
      context: .
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      DISABLE_KEYTAR: 1
      DISABLE_REDIS: 1
      ENABLE_REALTIME: 0
      LOG_BATCH_ENABLED: false
      SCAN_BATCH_ENABLED: false
      INTRUSION_BATCH_ENABLED: false
      APP_BASE_URL: http://localhost:${SANDBOX_PUBLIC_PORT:-3000}
      TRUST_PROXY_HOPS: 1
      MONGODB_URI: mongodb://mongo:27017/noteAppSandbox
    expose:
      - "3000"
    depends_on:
      - mongo
    security_opt:
      - no-new-privileges:true
    networks:
      - app_zone
      - data_zone

  mongo:
    image: mongo:7
    command:
      - --bind_ip_all
    volumes:
      - mongo_data:/data/db
    expose:
      - "27017"
    security_opt:
      - no-new-privileges:true
    networks:
      - data_zone

networks:
  edge_zone:
    driver: bridge
  app_zone:
    driver: bridge
    internal: true
  data_zone:
    driver: bridge
    internal: true

volumes:
  mongo_data: