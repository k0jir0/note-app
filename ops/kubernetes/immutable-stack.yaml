apiVersion: v1
kind: Namespace
metadata:
  name: helios
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: helios-runtime
  namespace: helios
data:
  NODE_ENV: production
  PORT: "3000"
  MONGODB_URI: mongodb://helios-mongo:27017/helios
  DISABLE_KEYTAR: "1"
  DISABLE_REDIS: "1"
  ENABLE_REALTIME: "0"
  LOG_BATCH_ENABLED: "false"
  SCAN_BATCH_ENABLED: "false"
  INTRUSION_BATCH_ENABLED: "false"
  TRUST_PROXY_HOPS: "1"
  APP_BASE_URL: http://localhost:3002
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: helios-proxy-config
  namespace: helios
data:
  default.conf: |
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path /tmp/proxy_temp;
    fastcgi_temp_path /tmp/fastcgi_temp;
    uwsgi_temp_path /tmp/uwsgi_temp;
    scgi_temp_path /tmp/scgi_temp;

    upstream helios_backend {
      server helios:3000;
        keepalive 16;
    }

    server {
        listen 8080;
        server_name _;
        server_tokens off;

        client_max_body_size 10m;

        location = /healthz {
            access_log off;
            add_header Content-Type text/plain;
            return 200 'ok';
        }

        location /api/security/stream {
            proxy_pass http://helios_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Client-Cert-Proxy-Verified "1";
            proxy_set_header X-Client-Cert-Verified "";
            proxy_set_header X-Client-Cert-Subject "";
            proxy_set_header X-Client-Cert-Issuer "";
            proxy_set_header X-Client-Cert-Fingerprint "";
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_read_timeout 3600s;
        }

        location / {
            proxy_pass http://helios_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Client-Cert-Proxy-Verified "1";
            proxy_set_header X-Client-Cert-Verified "";
            proxy_set_header X-Client-Cert-Subject "";
            proxy_set_header X-Client-Cert-Issuer "";
            proxy_set_header X-Client-Cert-Fingerprint "";
            proxy_set_header Connection '';
            proxy_redirect off;
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: helios-mongo
  namespace: helios
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: helios
      app.kubernetes.io/component: mongo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: helios
        app.kubernetes.io/component: mongo
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mongo
          image: docker.io/library/mongo:7@sha256:038b9c9f31c4a5b2a834a8f0e164312815ed651812aa8bca70bc1b521008409d
          imagePullPolicy: IfNotPresent
          command:
            - mongod
            - --bind_ip_all
          ports:
            - containerPort: 27017
              name: mongo
          readinessProbe:
            tcpSocket:
              port: mongo
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            tcpSocket:
              port: mongo
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: mongo-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: helios-mongo
  namespace: helios
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: helios
    app.kubernetes.io/component: mongo
  ports:
    - name: mongo
      port: 27017
      targetPort: mongo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: helios
  namespace: helios
spec:
  replicas: 3
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: helios
      app.kubernetes.io/component: app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: helios
        app.kubernetes.io/component: app
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app
          image: helios:hardened
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - secretRef:
              name: helios-secrets
            - configMapRef:
              name: helios-runtime
          readinessProbe:
            httpGet:
              path: /auth/login
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /auth/login
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: helios
  namespace: helios
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: helios
    app.kubernetes.io/component: app
  ports:
    - name: http
      port: 3000
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: helios-proxy
  namespace: helios
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: helios
      app.kubernetes.io/component: proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: helios
        app.kubernetes.io/component: proxy
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: proxy
          image: docker.io/library/nginx:1.27-alpine@sha256:62223d644fa234c3a1cc785ee14242ec47a77364226f1c811d2f669f96dc2ac8
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          volumeMounts:
            - name: proxy-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
            - name: proxy-tmp
              mountPath: /tmp
            - name: proxy-cache
              mountPath: /var/cache/nginx
            - name: proxy-run
              mountPath: /var/run
          securityContext:
            runAsUser: 101
            runAsGroup: 101
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: proxy-config
          configMap:
            name: helios-proxy-config
        - name: proxy-tmp
          emptyDir: {}
        - name: proxy-cache
          emptyDir: {}
        - name: proxy-run
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: helios-proxy
  namespace: helios
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: helios
    app.kubernetes.io/component: proxy
  ports:
    - name: http
      port: 80
      targetPort: http
      nodePort: 30080
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: helios-default-deny-ingress
  namespace: helios
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: helios-allow-proxy-ingress
  namespace: helios
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: helios
      app.kubernetes.io/component: proxy
  policyTypes:
    - Ingress
  ingress:
    - {}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: helios-allow-app-from-proxy
  namespace: helios
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: helios
      app.kubernetes.io/component: app
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: helios
              app.kubernetes.io/component: proxy
      ports:
        - protocol: TCP
          port: 3000
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: helios-rollout
  namespace: helios
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: helios-rollout
  namespace: helios
rules:
  - apiGroups:
      - apps
    resources:
      - deployments
    verbs:
      - get
      - list
      - patch
  - apiGroups:
      - apps
    resources:
      - deployments/status
    verbs:
      - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: helios-rollout
  namespace: helios
subjects:
  - kind: ServiceAccount
    name: helios-rollout
    namespace: helios
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: helios-rollout
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: helios-allow-mongo-from-app
  namespace: helios
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: helios
      app.kubernetes.io/component: mongo
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: helios
              app.kubernetes.io/component: app
      ports:
        - protocol: TCP
          port: 27017
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: helios-daily-rollout
  namespace: helios
spec:
  schedule: "0 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 3600
      template:
        spec:
          serviceAccountName: helios-rollout
          restartPolicy: OnFailure
          containers:
            - name: kubectl
              image: bitnami/kubectl:1.32.3
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - -c
                - |
                  kubectl rollout restart deployment/helios deployment/helios-proxy -n helios
                  kubectl rollout status deployment/helios -n helios --timeout=10m
                  kubectl rollout status deployment/helios-proxy -n helios --timeout=10m
