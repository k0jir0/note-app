client_body_temp_path /tmp/client_temp;
proxy_temp_path /tmp/proxy_temp;
fastcgi_temp_path /tmp/fastcgi_temp;
uwsgi_temp_path /tmp/uwsgi_temp;
scgi_temp_path /tmp/scgi_temp;

upstream note_app_backend {
    server app:3000;
    keepalive 16;
}

server {
    listen 8080;
    server_name _;
    server_tokens off;

    client_max_body_size 10m;

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    location /api/security/stream {
        proxy_pass http://note_app_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Client-Cert-Proxy-Verified "1";
        proxy_set_header X-Client-Cert-Verified "";
        proxy_set_header X-Client-Cert-Subject "";
        proxy_set_header X-Client-Cert-Issuer "";
        proxy_set_header X-Client-Cert-Fingerprint "";
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }

    location / {
        proxy_pass http://note_app_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Client-Cert-Proxy-Verified "1";
        proxy_set_header X-Client-Cert-Verified "";
        proxy_set_header X-Client-Cert-Subject "";
        proxy_set_header X-Client-Cert-Issuer "";
        proxy_set_header X-Client-Cert-Fingerprint "";
        proxy_set_header Connection '';
        proxy_redirect off;
    }
}
