name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.8.0

      - name: Install dependencies
        run: npm ci

      - name: Write .env from secrets
        run: |
          cat > .env <<'EOF'
          MONGODB_URI=${{ secrets.MONGODB_URI }}
          SESSION_SECRET=${{ secrets.SESSION_SECRET }}
          NOTE_ENCRYPTION_KEY=${{ secrets.NOTE_ENCRYPTION_KEY }}
          LEGACY_NOTE_ENCRYPTION_KEY=${{ secrets.LEGACY_NOTE_ENCRYPTION_KEY }}
          ALLOW_LEGACY_SESSION_SECRET_FALLBACK=${{ secrets.ALLOW_LEGACY_SESSION_SECRET_FALLBACK }}
          GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
          EOF

      - name: Run lint
        continue-on-error: true
        run: npm run lint

      - name: Run tests
        run: npm test
