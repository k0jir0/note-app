name: ITSG-33 Release Evidence

on:
  workflow_run:
    workflows: [CI, Security CI, Security Scan CI, Dependency Audit]
    types: [completed]

permissions:
  contents: read
  actions: read
  checks: read
  issues: write
  pull-requests: write

jobs:
  rollup:
    runs-on: ubuntu-latest

    steps:
      - name: Generate release evidence rollup
        id: rollup
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const workflowRun = context.payload.workflow_run;
            const requiredWorkflows = ['CI', 'Security CI', 'Security Scan CI', 'Dependency Audit'];
            const marker = '<!-- itsg33-release-evidence -->';

            if (workflowRun.event !== 'pull_request' || !workflowRun.pull_requests || workflowRun.pull_requests.length === 0) {
              const message = 'No pull request is associated with this workflow run.';
              fs.writeFileSync('itsg33-release-evidence.md', `${message}\n`, 'utf8');
              core.setOutput('should_upload', 'false');
              await core.summary.addRaw(message).write();
              return;
            }

            const pr = workflowRun.pull_requests[0];
            const { owner, repo } = context.repo;
            const runs = await github.paginate(github.rest.actions.listWorkflowRunsForRepo, {
              owner,
              repo,
              event: 'pull_request',
              head_sha: workflowRun.head_sha,
              per_page: 100
            });

            const latestByName = new Map();
            for (const run of runs) {
              if (!requiredWorkflows.includes(run.name)) {
                continue;
              }

              const current = latestByName.get(run.name);
              if (!current || new Date(run.updated_at) > new Date(current.updated_at)) {
                latestByName.set(run.name, run);
              }
            }

            const statuses = requiredWorkflows.map((name) => {
              const run = latestByName.get(name);
              if (!run) {
                return {
                  name,
                  status: 'missing',
                  conclusion: 'missing',
                  url: ''
                };
              }

              return {
                name,
                status: run.status || 'unknown',
                conclusion: run.conclusion || 'pending',
                url: run.html_url || ''
              };
            });

            const allCompleted = statuses.every((status) => status.status === 'completed');
            const allSuccessful = statuses.every((status) => status.conclusion === 'success');

            const summaryLines = [
              '## ITSG-33 Release Evidence',
              '',
              `PR: #${pr.number}`,
              `Head commit: ${workflowRun.head_sha}`,
              '',
              '| Workflow | Status | Conclusion | Run |',
              '| --- | --- | --- | --- |',
              ...statuses.map((status) => `| ${status.name} | ${status.status} | ${status.conclusion} | ${status.url ? `[link](${status.url})` : 'n/a'} |`),
              '',
              'Required artifact references:',
              '- docs/itsg33-evidence-checklist.md',
              '- docs/itsg33-operations-runbook.md',
              '- .github/pull_request_template.md',
              '',
              allCompleted
                ? (allSuccessful ? 'All required workflows completed successfully.' : 'One or more required workflows completed without success.')
                : 'Waiting for the remaining required workflows to complete.'
            ];

            const summary = summaryLines.join('\n');
            const commentBody = `${marker}\n${summary}`;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: pr.number,
              per_page: 100
            });
            const existing = comments.find((comment) => comment.body && comment.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body: commentBody
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pr.number,
                body: commentBody
              });
            }

            fs.writeFileSync('itsg33-release-evidence.md', `${summary}\n`, 'utf8');
            core.setOutput('should_upload', 'true');
            await core.summary.addRaw(summary).write();

      - name: Upload release evidence artifact
        if: steps.rollup.outputs.should_upload == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: itsg33-release-evidence
          path: itsg33-release-evidence.md
