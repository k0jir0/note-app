name: Security CI

on:
  push:
    branches: [ main, test-branch ]
  pull_request:
    branches: [ main ]

jobs:
  sast:
    name: SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.8.0'
          cache: 'npm'
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --progress=false
      - name: Install Semgrep
        run: pip install semgrep
      - name: Run dependency audit
        run: npm run audit:deps
      - name: Run Semgrep
        run: semgrep --config ./.semgrep.yml --severity ERROR --error --exclude node_modules --exclude playwright-report

  tests:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.8.0'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test --silent

  dast:
    name: DAST
    runs-on: ubuntu-latest
    needs: tests
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ ping: 1 })' --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12
    env:
      NODE_ENV: production
      PORT: 3000
      APP_BASE_URL: http://127.0.0.1:3000
      MONGODB_URI: mongodb://127.0.0.1:27017/noteAppCi
      SESSION_SECRET: ci-session-secret-0123456789abcdef
      NOTE_ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      CIPHER_ALGO: AES-256-GCM
      DISABLE_KEYTAR: '1'
      DISABLE_REDIS: '1'
      ENABLE_REALTIME: '0'
      LOG_BATCH_ENABLED: 'false'
      SCAN_BATCH_ENABLED: 'false'
      INTRUSION_BATCH_ENABLED: 'false'
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.8.0'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --progress=false
      - name: Start app
        run: |
          npm start > app.log 2>&1 &
          echo $! > app.pid
      - name: Wait for app readiness
        run: |
          for attempt in {1..24}; do
            if curl --silent --fail http://127.0.0.1:3000/healthz > /dev/null; then
              exit 0
            fi
            sleep 5
          done
          echo 'Application did not become ready in time.'
          cat app.log
          exit 1
      - name: Run OWASP ZAP baseline scan
        run: |
          set +e
          docker run --rm --network host -v "${PWD}:/zap/wrk:rw" ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py -t http://127.0.0.1:3000/auth/login -m 2 \
            -J /zap/wrk/zap-report.json -r /zap/wrk/zap-report.html
          status=$?
          set -e
          if [ "$status" -eq 1 ] || [ "$status" -eq 3 ]; then
            exit "$status"
          fi
          if [ "$status" -eq 2 ]; then
            echo 'ZAP reported warnings; review the uploaded report artifact.'
          fi
      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-baseline-report
          path: |
            zap-report.json
            zap-report.html
      - name: Upload app log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dast-app-log
          path: app.log
      - name: Stop app
        if: always()
        run: |
          if [ -f app.pid ]; then
            kill "$(cat app.pid)" || true
          fi
